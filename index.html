<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>◊ FallInsurance · sovereign UK insurance broker policy management</title>
<meta name="description" content="Sovereign single-file UK GI insurance broker policy management anchor. Multi-firm, multi-adviser, multi-client, multi-policy. IDD demands-and-needs, IPID tracking, CASS 5 client money, commission accounting, renewal pipeline, claims register. Informational, not a quote/bind platform.">
<meta name="prime" content="829">
<meta name="version" content="1.0.0">
<meta name="theme-color" content="#0b0a0f">
<link rel="manifest" href='data:application/manifest+json,{"name":"FallInsurance","short_name":"insurance","start_url":"./","display":"standalone","background_color":"%230b0a0f","theme_color":"%23b8974a","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%230b0a0f%27 rx=%2828%27/><text x=%2796%27 y=%27138%27 font-family=%27Georgia, serif%27 font-size=%27124%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%23b8974a%27>%E2%97%8A</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
:root{
  --void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;
  --line:#2a2934;--line-soft:#1f1e28;
  --cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;
  --brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;
  --green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--black-flag:#000;
  --serif:'Libre Baskerville',Georgia,ui-serif,serif;
  --sans:'DM Sans','Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
body{background-image:radial-gradient(circle at 12% 18%,rgba(184,151,74,0.04),transparent 38%),radial-gradient(circle at 88% 82%,rgba(139,26,26,0.05),transparent 42%)}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
input[type=number]{font-family:var(--mono)}
a{color:var(--brass)}a:hover{color:var(--amber)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--brass)}

.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}
.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}
.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--ox),var(--brass));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--cream)}
.brand .name{font-family:var(--serif);font-weight:600;font-size:14px;letter-spacing:0.02em}
.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}

.policy-pill{display:flex;align-items:center;gap:8px;padding:0 14px;height:100%;border-right:1px solid var(--line);cursor:pointer;font-size:12px;color:var(--cream-dim);max-width:340px;overflow:hidden}
.policy-pill:hover{background:var(--ink);color:var(--cream)}
.policy-pill .who{font-family:var(--serif);font-size:13px;color:var(--brass);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.policy-pill .meta{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase}

nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}
nav.tabs button{padding:0 14px;font-size:11px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent;text-transform:uppercase;font-family:var(--mono)}
nav.tabs button:hover{background:var(--ink);color:var(--cream)}
nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}

.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}
.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}
.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
.tool-btn.primary{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.tool-btn.primary:hover{background:var(--amber);border-color:var(--amber)}
.tool-btn.t3{border-color:var(--blue);color:var(--blue)}
.tool-btn.t3:hover{background:var(--blue);color:var(--void)}
.tool-btn.ox{border-color:var(--ox);color:var(--ox)}
.tool-btn.ox:hover{background:var(--ox);color:var(--cream)}

.drawer-toggle{display:none;padding:0 14px;height:100%;border-right:1px solid var(--line);font-size:18px;color:var(--brass)}

.layout{display:grid;grid-template-columns:320px 1fr;min-height:calc(100dvh - 48px)}
aside.sidebar{background:var(--void-2);border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px 60px;display:flex;flex-direction:column;gap:10px}
.sidebar h4{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;padding:0 4px;display:flex;justify-content:space-between;align-items:center}
.sidebar h4 .count{color:var(--cream-muted)}
.sidebar-search{display:flex;flex-direction:column;gap:6px}
.sidebar-search input,.sidebar-search select{font-size:12px;padding:6px 8px}
.policy-list{display:flex;flex-direction:column;gap:3px}
.policy-card{padding:9px 11px;border-radius:3px;cursor:pointer;border:1px solid transparent;border-left:3px solid var(--line);background:var(--ink);transition:all 0.1s;position:relative}
.policy-card:hover{background:var(--ink-2);border-left-color:var(--brass)}
.policy-card.active{background:var(--ink-2);border-left-color:var(--brass);border-color:var(--line)}
.policy-card.amber{border-left-color:var(--amber)}
.policy-card.red{border-left-color:var(--red)}
.policy-card.critical{border-left-color:var(--red);background:rgba(239,68,68,0.08)}
.policy-card.black{border-left-color:var(--black-flag);background:rgba(0,0,0,0.4)}
.policy-card .ref{font-family:var(--mono);font-size:9px;color:var(--brass);letter-spacing:0.08em}
.policy-card .nm{font-family:var(--serif);font-size:13px;color:var(--cream);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.policy-card .sub{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.04em;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
.policy-card .sub .tag{padding:1px 5px;border-radius:2px;background:var(--void);color:var(--cream-dim);font-size:9px}
.policy-card .sub .tag.cls{color:var(--brass)}
.policy-card .sub .tag.amber{background:var(--amber);color:var(--void)}
.policy-card .sub .tag.red{background:var(--red);color:var(--cream)}
.policy-card .sub .tag.critical{background:var(--red);color:var(--cream)}
.policy-card .sub .tag.black{background:var(--black-flag);color:var(--cream);border:1px solid var(--red)}
.policy-card .sub .tag.status{background:var(--ink-2);color:var(--cream-dim)}
.empty-state{padding:18px;text-align:center;color:var(--cream-muted);font-size:12px;font-style:italic;line-height:1.6}

main{padding:18px 22px 60px;overflow-y:auto;max-width:1280px;margin:0 auto;width:100%}

.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--cream);line-height:1.6}
.disclaimer strong{color:var(--brass);font-family:var(--mono);letter-spacing:0.04em;font-size:11px;text-transform:uppercase}

.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:0.01em}
.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.section-h .actions{display:flex;gap:6px;flex-wrap:wrap}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.grid.g2{grid-template-columns:repeat(auto-fit,minmax(380px,1fr))}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px}
.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px;color:var(--cream);letter-spacing:0.01em;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.card h3 .meta{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.1em}

.kpi{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--line-soft);font-size:13px;gap:10px}
.kpi:last-child{border-bottom:none}
.kpi .l{color:var(--cream-dim)}
.kpi .v{font-family:var(--mono);color:var(--cream);font-weight:500;text-align:right}
.kpi .v.green{color:var(--green)}.kpi .v.red{color:var(--red)}.kpi .v.amber{color:var(--amber)}.kpi .v.brass{color:var(--brass)}.kpi .v.blue{color:var(--blue)}.kpi .v.black{color:var(--black-flag);background:var(--red);padding:1px 6px;border-radius:2px}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.r3{grid-template-columns:1fr 1fr 1fr}
.row.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%}
.field textarea{min-height:60px;resize:vertical}
.field .hint{font-size:10px;color:var(--cream-muted);margin-top:3px;font-family:var(--mono);line-height:1.4}

.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent;letter-spacing:0.04em;cursor:pointer;font-family:var(--sans)}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.primary{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.primary:hover{background:var(--amber);border-color:var(--amber);color:var(--void)}
.btn.ox{border-color:var(--ox);color:var(--ox)}
.btn.ox:hover{background:var(--ox);color:var(--cream)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.ghost:hover{border-color:var(--brass);color:var(--brass)}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
td{padding:7px 8px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:11px;vertical-align:top}
tr:hover td{background:var(--ink)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:5px;max-width:680px;width:100%;max-height:90dvh;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(184,151,74,0.2)}
.modal.wide{max-width:920px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-family:var(--serif);font-size:16px;color:var(--brass)}
.modal-b{padding:18px 20px;overflow-y:auto;flex:1}
.modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}

.tag-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.t-tag{padding:3px 8px;background:var(--ink);border:1px solid var(--line);border-radius:3px;font-size:10px;font-family:var(--mono);color:var(--cream-dim);display:inline-flex;gap:5px;align-items:center}
.t-tag .x{cursor:pointer;color:var(--ox);font-weight:700}
.t-tag .x:hover{color:var(--red)}

.callout{background:rgba(184,151,74,0.08);border-left:3px solid var(--brass);padding:10px 14px;border-radius:3px;font-size:12px;color:var(--cream-dim);margin:8px 0}
.callout.amber{background:rgba(255,140,0,0.08);border-left-color:var(--amber)}
.callout.red{background:rgba(239,68,68,0.1);border-left-color:var(--red)}
.callout.green{background:rgba(74,222,128,0.08);border-left-color:var(--green)}

.boot-screen{min-height:100dvh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 30%,rgba(184,151,74,0.06),transparent 60%)}
.boot-card{max-width:580px;width:100%;background:var(--void-2);border:1px solid var(--brass);border-radius:6px;padding:32px 36px;box-shadow:0 0 60px rgba(139,26,26,0.18)}
.boot-card h1{font-family:var(--serif);font-size:26px;font-weight:600;margin-bottom:4px;letter-spacing:0.01em}
.boot-card .sub{font-family:var(--mono);font-size:11px;color:var(--brass);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:22px}
.boot-step{margin-top:18px;padding-top:18px;border-top:1px dashed var(--line)}
.boot-step h3{font-family:var(--serif);font-size:15px;color:var(--brass);margin-bottom:10px}
.boot-step .step-meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px}

.t3-panel{position:fixed;right:0;top:48px;bottom:0;width:420px;background:var(--void-2);border-left:1px solid var(--brass);transform:translateX(100%);transition:transform 0.25s;z-index:80;display:flex;flex-direction:column}
.t3-panel.show{transform:translateX(0)}
.t3-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.t3-h h3{font-family:var(--serif);font-size:14px;color:var(--brass)}
.t3-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.t3-msg{padding:10px 12px;border-radius:4px;font-size:12px;line-height:1.55}
.t3-msg.user{background:var(--ink-2);border-left:2px solid var(--brass)}
.t3-msg.bot{background:var(--ink);border-left:2px solid var(--blue);white-space:pre-wrap}
.t3-msg.sys{background:rgba(184,151,74,0.06);border-left:2px solid var(--brass);font-family:var(--mono);font-size:11px;color:var(--cream-dim)}
.t3-input{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px}
.t3-input input{flex:1}

.audit-row{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line-soft);font-size:11px}
.audit-row .ts{font-family:var(--mono);color:var(--cream-muted);font-size:10px}
.audit-row .act{font-family:var(--mono);color:var(--brass);font-size:11px}
.audit-row .why{color:var(--cream-dim);margin-top:2px;font-size:11px}
.audit-row .hash{font-family:var(--mono);color:var(--cream-muted);font-size:9px;margin-top:2px;letter-spacing:0.04em;overflow:hidden;text-overflow:ellipsis}

.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
.tab-bar button{padding:9px 16px;font-size:11px;color:var(--cream-dim);font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap}
.tab-bar button:hover{color:var(--cream)}
.tab-bar button.active{color:var(--brass);border-bottom-color:var(--brass)}

.flag-amber{color:var(--amber);font-family:var(--mono);font-size:10px;letter-spacing:0.08em}
.flag-red{color:var(--red);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;font-weight:600}
.flag-critical{color:var(--cream);background:var(--red);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;font-weight:600;padding:1px 6px;border-radius:2px}
.flag-black{color:var(--cream);background:var(--black-flag);border:1px solid var(--red);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;font-weight:600;padding:1px 6px;border-radius:2px}
.flag-ok{color:var(--green);font-family:var(--mono);font-size:10px;letter-spacing:0.08em}

.t0-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
.t0-card{background:var(--ink);border:1px solid var(--line);border-radius:3px;padding:10px 12px;cursor:pointer;transition:all 0.1s}
.t0-card:hover{border-color:var(--brass);background:var(--ink-2)}
.t0-card .q{font-size:12px;color:var(--cream);font-family:var(--serif)}
.t0-card .a{font-size:10px;color:var(--cream-muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}

.timeline{position:relative;padding-left:18px;border-left:1px solid var(--line)}
.timeline-item{margin-bottom:14px;position:relative}
.timeline-item::before{content:'';position:absolute;left:-22px;top:5px;width:8px;height:8px;background:var(--brass);border-radius:50%;border:2px solid var(--void)}
.timeline-item .ts{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.08em}
.timeline-item .ev{font-size:13px;color:var(--cream);margin-top:2px;font-family:var(--serif)}
.timeline-item .det{font-size:11px;color:var(--cream-dim);margin-top:3px}

.dn-q{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:12px}
.dn-q .q-label{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.dn-q .q-text{font-family:var(--serif);font-size:13px;color:var(--cream);margin-bottom:8px;line-height:1.5}

.pipe-card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:14px 16px;border-left:4px solid var(--line)}
.pipe-card.amber{border-left-color:var(--amber)}
.pipe-card.red{border-left-color:var(--red)}
.pipe-card.critical{border-left-color:var(--red);background:rgba(239,68,68,0.06)}
.pipe-card.black{border-left-color:var(--black-flag);background:rgba(0,0,0,0.3)}
.pipe-card h3{font-family:var(--serif);font-size:14px;color:var(--cream);margin-bottom:4px;display:flex;justify-content:space-between;align-items:baseline}
.pipe-card h3 .n{font-family:var(--mono);font-size:18px;color:var(--brass)}
.pipe-card .pipe-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.pipe-row{padding:7px 9px;background:var(--ink);border-radius:3px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between;gap:8px;align-items:center}
.pipe-row:hover{background:var(--ink-2)}
.pipe-row .nm{font-family:var(--serif);font-size:12px;color:var(--cream)}
.pipe-row .days{font-family:var(--mono);font-size:10px;color:var(--brass)}

.fb-fab{position:fixed;bottom:18px;right:18px;background:var(--brass);color:var(--void);border-radius:50%;width:48px;height:48px;display:grid;place-items:center;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.5);z-index:50;font-weight:700}
.fb-fab:hover{background:var(--amber)}

.note-item{background:var(--ink);border:1px solid var(--line);border-radius:3px;padding:10px 12px;margin-bottom:8px}
.note-item .nh{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-bottom:4px}
.note-item .nb{font-size:12px;color:var(--cream)}

.cm-bar{height:6px;background:var(--ink);border-radius:3px;overflow:hidden;margin-top:4px}
.cm-bar .cm-fill{height:100%;background:linear-gradient(90deg,var(--brass),var(--amber));transition:width 0.3s}

@media (max-width:880px){
  .layout{grid-template-columns:1fr}
  aside.sidebar{position:fixed;left:0;top:48px;bottom:0;width:88vw;max-width:340px;z-index:90;transform:translateX(-100%);transition:transform 0.25s;box-shadow:2px 0 16px rgba(0,0,0,0.5)}

// ---- T0 ruleset (14 rules per spec) ------------------------------
const T0_RULES = [
  {q:"What is IDD Article 20 demands & needs?",
   a:"IDD Article 20 (Insurance Distribution Directive 2016/97, in force 01-Oct-2018) requires that before concluding any insurance contract the distributor must specify, on the basis of information obtained from the customer, the customer's demands and needs, and ensure the contract proposed is consistent with them. Output must be provided to the customer in a clear, accurate, and comprehensible form. For non-advised sales, the demands-and-needs statement is mandatory; for advised sales, the personalised recommendation must additionally explain why a particular product best meets the customer's demands and needs. FCA ICOBS 5.2 implements this in UK rules — keep evidence on file for at least the policy term + 6 years."},
  {q:"IPID requirements?",
   a:"The Insurance Product Information Document (IPID) is a standardised pre-contractual disclosure required under IDD Article 20(5) for non-life insurance products. It must be provided on a durable medium before the contract is concluded. Mandatory content (FCA ICOBS 6.1.10A): product name and manufacturer; type of insurance; main risks insured; sum insured; geographic scope; main exclusions; obligations at start, during and at end of contract; means and duration of payments; termination conditions. Must be a stand-alone document, max 2 sides of A4, use the prescribed common format and icons. Brokers should record delivery method, date, version hash and recipient."},
  {q:"CASS 5 client money rules?",
   a:"CASS 5 governs insurance broker client money. Two permitted models: (a) statutory trust (CASS 5.3) — strictest, money held on trust for clients; (b) non-statutory trust (CASS 5.4) — permits use of client money to extend credit and pay claims/refunds across clients. Mixed accounts must be reconciled and split same business day. Internal client money reconciliation must be performed as often as necessary and at least every 25 business days (CASS 5.5.63) — amber flag at 25d, red at 45d. External (bank) reconciliation at least monthly. A client money resource check confirms resource >= requirement; any shortfall must be funded from the firm's own resources by close of next business day. Must hold money in approved bank, get acknowledgement letter, and submit CMAR returns to FCA."},
  {q:"Insurance Distribution Directive overview?",
   a:"IDD (Directive 2016/97/EU) replaced the Insurance Mediation Directive on 01-Oct-2018, retained post-Brexit. Scope: anyone distributing insurance, including ancillary intermediaries above thresholds. Key requirements: (1) honest, fair, professional conduct in the customer's best interests; (2) 15 hours/year CPD for distributors; (3) demands-and-needs assessment for every sale (Art 20); (4) IPID for non-life products; (5) remuneration disclosure — nature (fee/commission/mix) and basis (Art 19); (6) cross-selling restrictions; (7) product oversight & governance (POG) — manufacturer must define target market and review periodically; (8) conflicts of interest management. Implemented in FCA ICOBS, SYSC and PROD 4 sourcebooks."},
  {q:"Commercial vs consumer customer category?",
   a:"FCA ICOBS distinguishes 'consumer' (any natural person acting outside their trade, business or profession) from 'commercial customer' (everyone else). Consequences: consumers receive heightened protection — ICOBS 5.1.4 duty of fair presentation reversed (insurer bears more burden), Consumer Insurance (Disclosure and Representations) Act 2012 replaces Marine Insurance Act 1906 §17–20 utmost good faith for them, CIDRA only requires reasonable care not to misrepresent. Commercial customers fall under Insurance Act 2015 fair-presentation duty (knew or ought to know), with proportionate remedies for breach. IPID is mandatory for both unless customer is a 'large risk' (Art 13 of Solvency II — large industrial/transport)."},
  {q:"Conduct of Business COBS for insurance?",
   a:"Insurance distribution sits primarily under ICOBS (Insurance: Conduct of Business sourcebook), not COBS. ICOBS chapters: 2 general matters; 4 information to customers (status, scope, remuneration); 5 identifying client needs (D&N statement, suitability for advised sales); 6 product information (IPID, policy summary, additional ICOBS 6A rules for protection); 7 cancellation (consumer 14-day cooling off, 30 for pure protection); 8 claims handling — promptly, fairly, no unreasonable barriers, regular updates. Pure-protection life cover sits in COBS instead. PROD 4 sets product-oversight rules for manufacturers and distributors."},
  {q:"AR vs DA broker?",
   a:"Directly Authorised (DA) brokers are individually authorised by the FCA and carry their own permissions, capital requirements, PI cover (min £1,300,380 per claim, £1,924,560 aggregate under MIPRU 3.2.7R, indexed) and reporting (GABRIEL/RegData, CMAR). Appointed Representatives (AR) operate under a Principal firm's permissions — the Principal accepts full regulatory responsibility for the AR's regulated activities (FSMA s.39). Principal must maintain a written AR agreement, ensure fit-and-proper status, supervise activities, and meets capital and CMAR for the AR. Network examples: Cobra, Bspoke, Movo, Bravo. AR can switch to DA but typically needs ~£100k+ capital, dedicated compliance and broker management systems."},
  {q:"Conduct rule 4 — fair clear not misleading?",
   a:"Individual Conduct Rule 4 (SM&CR): 'You must pay due regard to the interests of customers and treat them fairly.' Combined with Principle 7 (communications must be clear, fair and not misleading) and the new Consumer Duty (PRIN 2A, in force 31-Jul-2023 for new and 31-Jul-2024 for closed products). Consumer Duty cross-cutting rules require firms to act in good faith, avoid foreseeable harm, and enable customers to pursue their financial objectives. Four outcomes: products & services, price & value, consumer understanding, consumer support. Insurance brokers must evidence fair value assessment annually for all consumer products. Breach attracts SM&CR enforcement against individuals as well as firm action."},
  {q:"Cyber insurance market?",
   a:"UK cyber market GWP ~£300m (2024 est, ABI). Typical SME standalone cover £25k–£5m limit, premiums £400–£15k depending on revenue, sector, controls. Standard insuring agreements: (1) first-party — incident response (forensics, legal, PR, notification costs), business interruption, cyber extortion (incl. ransomware ransom subject to OFAC/sanctions filter), data restoration; (2) third-party — privacy liability (GDPR fines insurable to extent permitted by law — England/Wales generally permits, contrast with insurability debates in NL/Italy), network security liability, media liability. Key exclusions: war/cyber-war (post Lloyd's LMA5564/5565/5566/5567 wordings effective Mar-2023), infrastructure exclusions, unpatched-vulnerability. Risk controls expected: MFA, EDR, backups (offline/immutable), patching SLA, incident response plan, employee training."},
  {q:"PI minimum cover for brokers?",
   a:"MIPRU 3.2.7R sets minimum PI cover for insurance intermediaries: at least €1,250,000 per claim AND €1,850,000 aggregate, OR if 'sole liability is for the firm', alternative resource capital may be held under MIPRU 3.2.16R. FCA converted figures stand at £1,300,380 per claim and £1,924,560 aggregate (2023 update). The cover must include claims arising from breach of duty (MIPRU 3.2.10R), apply to all permitted activities, have an excess of no more than the higher of £5,000 or 1.5% of annual income (MIPRU 3.2.14R), and be from an EEA-authorised insurer or equivalent (MIPRU 3.2.11R). Networks may aggregate cover across their ARs but the per-firm minimum still applies. Renewal date must be tracked — uncovered period = breach of threshold conditions."},
  {q:"RTI mid-term adjustment?",
   a:"Mid-Term Adjustment (MTA) — any change to a policy during the period of insurance: increase/decrease in sum insured, added/removed vehicles or locations, change in trade activity, additional insureds, change in business turnover. Process: (1) record the demands-and-needs delta (ICOBS 5.2); (2) obtain insurer agreement (or quote, if subject to underwriting); (3) calculate pro-rata or short-period premium adjustment per the policy schedule; (4) collect/refund difference (CASS 5 if money handled); (5) issue endorsement and revised schedule; (6) audit trail of authority and change. RTI (Real-Time Information) loosely used by brokers to describe live policy adjustments on broking platforms. Common pitfalls: forgetting to notify insurer (voids cover), failing to refund pro-rata correctly, not updating IPID."},
  {q:"Premium financing fee disclosure?",
   a:"Where a broker arranges premium financing (e.g. Premium Credit, Close Brothers Premium Finance) for a customer, this is a regulated credit activity (CCA 1974 / CONC) requiring an additional permission ('credit broking'). Disclosure required: (a) total amount of credit; (b) APR; (c) total amount payable; (d) duration; (e) any default charges; (f) the firm's commission/fee from the finance provider — Consumer Duty fair-value lens makes hidden commissions on PF a high-risk practice; FCA Multi-Firm Review on PF (Nov 2023) found pricing concerns. Pre-contract information (PCCI) and explanation must be provided in good time. The credit agreement is separate from the insurance contract — cancellation rights differ (14-day cooling-off on consumer credit too)."},
  {q:"Schemes admin vs full broking?",
   a:"A 'scheme' (or delegated authority / binder / TOBA-DA) is an arrangement under which an underwriting authority is delegated by an insurer to a broker or MGA to bind risks within agreed parameters (occupation, sum insured, premium, retention). Schemes admin = broker operates the scheme: quote, bind, issue documents, collect premium, sometimes pay claims, all within the binder authority. Higher commission (often 25–40%) but heavier obligations: bordereaux reporting, Lloyd's Coverholder approval if at Lloyd's, audit cooperation, conduct & treatment outcome reporting, Consumer Duty fair-value assessment as co-manufacturer (PROD 4.2A). Full broking = placing each risk individually with insurer underwriting on a case-by-case basis — lower commission (typically 10–22.5%), no manufacturing responsibility, no bordereaux."},
  {q:"FOS limits for insurance?",
   a:"Financial Ombudsman Service (FOS) jurisdiction for insurance complaints: eligible complainants are consumers, micro-enterprises (<10 employees AND <€2m turnover/balance sheet), small businesses (turnover <£6.5m, <50 employees, balance sheet <£5m, post Apr-2019), charities (<£6.5m income), trustees (<£5m net assets), CICs. Award limits (from 01-Apr-2024): (i) £430,000 for complaints about acts/omissions on or after 01-Apr-2019; (ii) £195,000 for complaints about acts/omissions before that date; both indexed annually. FOS can also order interest, costs, and direct firm to take steps. Complaints must reach the firm first; firm has 8 weeks to respond; complainant has 6 months from final response to refer to FOS, 6 years from event / 3 from awareness (whichever later) under DISP 2.8."}
];

// ---- IDB ---------------------------------------------------------
const DB_NAME = 'fallinsurance-db';
const DB_VERSION = 1;
const STORES = ['firms','advisers','clients','policies','clientAccount','audit','settings'];
let _db = null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });
    };
    req.onsuccess = ()=>{ _db = req.result; resolve(_db); };
    req.onerror = ()=>reject(req.error);
  });
}
function idbPut(store, val){
  return new Promise((res,rej)=>{
    const tx = _db.transaction(store,'readwrite');
    tx.objectStore(store).put(val);
    tx.oncomplete = ()=>res(val);
    tx.onerror = ()=>rej(tx.error);
  });
}
function idbGet(store, id){
  return new Promise((res,rej)=>{
    const tx = _db.transaction(store,'readonly');
    const r = tx.objectStore(store).get(id);
    r.onsuccess = ()=>res(r.result || null);
    r.onerror = ()=>rej(r.error);
  });
}
function idbAll(store){
  return new Promise((res,rej)=>{
    const tx = _db.transaction(store,'readonly');
    const r = tx.objectStore(store).getAll();
    r.onsuccess = ()=>res(r.result || []);
    r.onerror = ()=>rej(r.error);
  });
}
function idbDel(store, id){
  return new Promise((res,rej)=>{
    const tx = _db.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = ()=>res();
    tx.onerror = ()=>rej(tx.error);
  });
}
function idbClear(store){
  return new Promise((res,rej)=>{
    const tx = _db.transaction(store,'readwrite');
    tx.objectStore(store).clear();
    tx.oncomplete = ()=>res();
    tx.onerror = ()=>rej(tx.error);
  });
}

// ---- crypto helpers ---------------------------------------------
async function sha256(s){
  try{
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(String(s)));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ return 'nocrypto-'+Date.now(); }
}
function uuid(){
  if(crypto.randomUUID) return crypto.randomUUID();
  return 'x'+Math.random().toString(36).slice(2)+Date.now().toString(36);
}
function newId(prefix){ return prefix+'_'+uuid().replace(/-/g,'').slice(0,16); }

// ---- audit chain (cap 100k, FCA SYSC 6yr) ------------------------
const AUDIT_CAP = 100000;
async function appendAudit(entry){
  const all = await idbAll('audit');
  const last = all.sort((a,b)=>a.i-b.i)[all.length-1];
  const i = last ? last.i + 1 : 1;
  const prevHash = last ? last.docHash : '0'.repeat(64);
  const base = {
    i, ts: Date.now(),
    tool: TOOLNAME,
    adviserId: entry.adviserId || (STATE.activeAdviserId||''),
    clientId: entry.clientId || '',
    policyId: entry.policyId || '',
    action: entry.action,
    reasoning: entry.reasoning || '',
    configVersion: CONFIG_VERSION,
    prevHash,
    payload: entry.payload || {}
  };
  base.docHash = await sha256(JSON.stringify({i,ts:base.ts,action:base.action,prevHash,payload:base.payload}));
  base.id = 'au_'+i.toString().padStart(8,'0');
  await idbPut('audit', base);
  // cap
  if(all.length + 1 > AUDIT_CAP){
    const sorted = all.sort((a,b)=>a.i-b.i);
    const toDel = sorted.slice(0, all.length + 1 - AUDIT_CAP);
    for(const e of toDel) await idbDel('audit', e.id);
  }
  return base;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtGBP(n){ const v = Number(n)||0; return '£'+v.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return '—'; try{ return new Date(d).toISOString().slice(0,10); }catch(e){ return '—'; } }
function fmtDT(ts){ if(!ts) return '—'; try{ return new Date(ts).toISOString().slice(0,19).replace('T',' '); }catch(e){ return '—'; } }
function daysUntil(dateStr){
  if(!dateStr) return null;
  const t = new Date(dateStr+'T12:00:00Z').getTime();
  if(isNaN(t)) return null;
  return Math.ceil((t - Date.now())/86400000);
}
function renewalFlag(days){
  if(days===null||days===undefined) return null;
  if(days < 0) return 'lapsed';
  if(days <= 7) return 'black';
  if(days <= 14) return 'critical';
  if(days <= 30) return 'red';
  if(days <= 60) return 'amber';
  return null;
}
function flagPill(flag){
  switch(flag){
    case 'amber': return '<span class="flag-amber">AMBER · 60d</span>';
    case 'red': return '<span class="flag-red">RED · 30d</span>';
    case 'critical': return '<span class="flag-critical">CRITICAL · 14d</span>';
    case 'black': return '<span class="flag-black">BLACK · 7d</span>';
    case 'lapsed': return '<span class="flag-red">LAPSED</span>';
    default: return '<span class="flag-ok">OK</span>';
  }
}
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
const meshSendDebounced = debounce(meshSend, 300);

// ---- Sidebar (policy list) -------------------------------------
function renderSidebar(){
  const f = STATE.filter;
  const insurers = Array.from(new Set(STATE.policies.map(p=>p.insurer).filter(Boolean))).sort();
  let list = STATE.policies.slice();
  if(f.q){
    const q = f.q.toLowerCase();
    list = list.filter(p=>{
      const c = clientById(p.clientId);
      return (p.ref||'').toLowerCase().includes(q) ||
             (p.insurer||'').toLowerCase().includes(q) ||
             (p.policyNumber||'').toLowerCase().includes(q) ||
             (c && ((c.lastName||'')+' '+(c.firstName||'')+' '+(c.preferredName||'')).toLowerCase().includes(q));
    });
  }
  if(f.productClass) list = list.filter(p=>p.productClass===f.productClass);
  if(f.insurer) list = list.filter(p=>p.insurer===f.insurer);
  if(f.status) list = list.filter(p=>p.status===f.status);
  if(f.dueWindow){
    list = list.filter(p=>{
      const d = daysUntil(p.renewalDate);
      if(d===null) return false;
      if(f.dueWindow==='60') return d>=0 && d<=60;
      if(f.dueWindow==='30') return d>=0 && d<=30;
      if(f.dueWindow==='14') return d>=0 && d<=14;
      if(f.dueWindow==='7') return d>=0 && d<=7;
      return true;
    });
  }
  list.sort((a,b)=>{
    const da = daysUntil(a.renewalDate); const db = daysUntil(b.renewalDate);
    if(da===null && db===null) return (b.updatedAt||0)-(a.updatedAt||0);
    if(da===null) return 1; if(db===null) return -1;
    return da - db;
  });

  return `<aside class="sidebar ${STATE.drawerOpen?'show':''}">
    <h4>Policies <span class="count">${list.length} / ${STATE.policies.length}</span></h4>
    <div class="sidebar-search">
      <input id="s-q" placeholder="Search ref / client / insurer / policy no" value="${esc(f.q)}">
      <select id="s-pc"><option value="">All product classes</option>${PRODUCT_CLASSES.map(c=>`<option value="${c}" ${f.productClass===c?'selected':''}>${PRODUCT_LABEL[c]}</option>`).join('')}</select>
      <select id="s-in"><option value="">All insurers</option>${insurers.map(i=>`<option value="${esc(i)}" ${f.insurer===i?'selected':''}>${esc(i)}</option>`).join('')}</select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <select id="s-st"><option value="">Any status</option>${STATUS_VALUES.map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('')}</select>
        <select id="s-dw"><option value="">Any renewal</option><option value="60" ${f.dueWindow==='60'?'selected':''}>≤60d</option><option value="30" ${f.dueWindow==='30'?'selected':''}>≤30d</option><option value="14" ${f.dueWindow==='14'?'selected':''}>≤14d</option><option value="7" ${f.dueWindow==='7'?'selected':''}>≤7d</option></select>
      </div>
    </div>
    <div class="policy-list">
      ${list.length===0 ? '<div class="empty-state">No policies match.<br>Click <strong>+ Policy</strong> top-right.</div>' : list.map(renderPolicyCard).join('')}
    </div>
  </aside>`;
}

function renderPolicyCard(p){
  const c = clientById(p.clientId);
  const days = daysUntil(p.renewalDate);
  const flag = renewalFlag(days);
  const cardCls = flag==='black' ? 'black' : (flag==='critical' ? 'critical' : (flag||'')) ;
  const dayTag = days!==null ? `<span class="tag ${flag||''}">${days<0?(Math.abs(days)+'d lapsed'):(days+'d')}</span>` : '';
  return `<div class="policy-card ${STATE.activePolicyId===p.id?'active':''} ${cardCls}" data-id="${p.id}">
    <div class="ref">${esc(p.ref)}</div>
    <div class="nm">${esc(c?(c.preferredName||c.lastName||(c.firstName+' '+c.lastName)):'—')}</div>
    <div class="sub">
      <span class="tag cls">${PRODUCT_LABEL[p.productClass]||p.productClass}</span>
      <span class="tag">${esc(p.insurer||'?')}</span>
      <span class="tag status">${esc(p.status)}</span>
      ${dayTag}
    </div>
  </div>`;
}

      <div class="kpi"><span class="l">Due ≤30d <span class="flag-red">RED</span></span><span class="v ${due30?'red':''}">${due30}</span></div>
      <div class="kpi"><span class="l">Due ≤14d <span class="flag-critical">CRITICAL</span></span><span class="v ${due14?'red':''}">${due14}</span></div>

// ---- Renewals pipeline ----
function renderRenewals(){
  const buckets = [
    {key:'7', label:'≤7 days · BLACK', cls:'black'},
    {key:'14', label:'≤14 days · CRITICAL', cls:'critical'},
    {key:'30', label:'≤30 days · RED', cls:'red'},
    {key:'60', label:'≤60 days · AMBER', cls:'amber'}
  ];
  const grouped = {7:[],14:[],30:[],60:[]};
  STATE.policies.forEach(p=>{
    const d = daysUntil(p.renewalDate);
    if(d===null || d<0) return;
    if(d<=7) grouped[7].push(p);
    else if(d<=14) grouped[14].push(p);
    else if(d<=30) grouped[30].push(p);
    else if(d<=60) grouped[60].push(p);
  });

  return `
  <div class="section-h"><h2>Renewal pipeline</h2><div class="sub">FCA · 60 / 30 / 14 / 7 day windows · mesh: renewal.due</div></div>
  <div class="grid g2">
    ${buckets.map(b=>{
      const list = grouped[b.key].sort((a,b)=>daysUntil(a.renewalDate)-daysUntil(b.renewalDate));
      return `<div class="pipe-card ${b.cls}"><h3><span>${b.label}</span><span class="n">${list.length}</span></h3>
        <div class="pipe-list">
          ${list.length===0?'<div class="empty-state">— none —</div>':list.map(p=>{
            const c = clientById(p.clientId);
            return `<div class="pipe-row" onclick="openPolicy('${p.id}')">
              <div><div class="nm">${esc(c?(c.preferredName||c.lastName):'—')} · ${esc(p.ref)}</div><div style="font-family:var(--mono);font-size:9px;color:var(--cream-muted)">${PRODUCT_LABEL[p.productClass]} · ${esc(p.insurer)} · ${fmtGBP(p.premium?.gross)}</div></div>
              <div class="days">${daysUntil(p.renewalDate)}d</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>
  <div style="margin-top:18px" class="card"><h3>Quick action — launch renewal review</h3>
    <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Select a policy from the pipeline above or sidebar, open the policy tab, refresh demands &amp; needs, requote with markets, present terms, and bind. The 60-day window is the FCA Consumer Duty expectation for proactive renewal contact.</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn" onclick="broadcastAllRenewals()">Broadcast renewal.due (all windows)</button>
      <button class="btn ghost" onclick="exportRenewalsCsv()">Export renewals CSV</button>
    </div>
  </div>`;
}

  const c = clientById(p.clientId);
  const a = adviserById(p.adviserId);
  const days = daysUntil(p.renewalDate);
  const flag = renewalFlag(days);

  const tabs = [
    ['overview','Overview'],['cover','Cover'],['dn','Demands & Needs'],
    ['ipid','IPID'],['commission','Commission'],['mta','MTAs'],['claims','Claims'],['timeline','Timeline']
  ];
  let body;
  switch(STATE.activePolicyTab){
    case 'overview': body = renderPolOverview(p,c,a); break;
    case 'cover': body = renderPolCover(p); break;
    case 'dn': body = renderPolDN(p); break;
    case 'ipid': body = renderPolIPID(p); break;
    case 'commission': body = renderPolCommission(p); break;

    <div class="dn-q"><div class="q-label">Q1 · What does the client need cover for?</div><div class="q-text">Capture the scope of cover sought — property, liability, business interruption period, vehicles, key persons, professional services exposure, cyber, etc.</div><div class="field"><textarea rows="3" onchange="updateDN('${p.id}','coverFor',this.value)">${esc(dn.coverFor)}</textarea></div></div>

// ---- field updaters ----
async function updateField(id, key, value){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  if(key==='status' && value==='in-force'){
    if(!(p.ipid && p.ipid.delivered)){ alert('Cannot bind: IPID not recorded as delivered. Go to the IPID tab.'); render(); return; }
    if(!(p.demandsAndNeeds && p.demandsAndNeeds.trim().length>30)){ alert('Cannot bind: Demands & Needs statement missing. Go to the D&N tab and compile.'); render(); return; }
  }
  const before = p[key];
  p[key] = value;
  p.updatedAt = Date.now();
  if(p.demoFlag && key!=='demoFlag'){ /* keep flag */ }
  await idbPut('policies', p);
  await appendAudit({policyId:p.id, clientId:p.clientId, action:'policy.field.updated', reasoning:`${key}: ${JSON.stringify(before)} → ${JSON.stringify(value)}`, payload:{key,value}});
  meshSendDebounced('policy.updated', p);
  render();
}

async function updatePath(id, path, value){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  const parts = path.split('.');
  let obj = p;
  for(let i=0;i<parts.length-1;i++){
    if(!obj[parts[i]] || typeof obj[parts[i]]!=='object') obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length-1]] = value;
  p.updatedAt = Date.now();
  await idbPut('policies', p);
  await appendAudit({policyId:p.id, clientId:p.clientId, action:'policy.path.updated', reasoning:`${path} updated`, payload:{path,value}});
  meshSendDebounced('policy.updated', p);
  render();
}

async function updatePremium(id, key, val){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  if(!p.premium) p.premium = {gross:0,ipt:0,fee:0,commission:0,net:0};
  p.premium[key] = val;
  recalcInternal(p);
  await idbPut('policies', p);
  await appendAudit({policyId:p.id, clientId:p.clientId, action:'policy.premium.updated', reasoning:`${key}: ${val}`, payload:{key,val,premium:p.premium}});
  meshSendDebounced('policy.updated', p);
  render();
}

function recalcInternal(p){
  const pct = Number(p.commissionPct)||0;
  const gross = Number(p.premium?.gross)||0;
  p.premium.commission = +(gross * pct / 100).toFixed(2);
  p.premium.net = +(gross - p.premium.commission).toFixed(2);
  p.updatedAt = Date.now();
}
async function recalcPremium(id){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  recalcInternal(p);
  await idbPut('policies', p);
  await appendAudit({policyId:p.id, action:'policy.premium.recalc', reasoning:'Manual recalc', payload:{premium:p.premium}});
  meshSendDebounced('policy.updated', p);
  render();
}

async function recordCommissionReceived(id){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  await appendAudit({policyId:p.id, action:'commission.received', reasoning:`£${p.premium?.commission} on ${p.ref}`, payload:{amount:p.premium?.commission, insurer:p.insurer}});
  meshSend('commission.received', {policyId:p.id, ref:p.ref, amount:p.premium?.commission, insurer:p.insurer, ts:Date.now()});
  addTimelineEntry(p, 'Commission received', fmtGBP(p.premium?.commission));
  await idbPut('policies', p);
  alert('Commission recorded & broadcast to fallinsurancepractice');
  render();
}

// ---- DN compile ----
function updateDN(id, key, val){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  if(!p.dnAnswers) p.dnAnswers = {coverFor:'',capacity:'',claimsHistory:'',preferences:'',vulnerabilities:''};
  p.dnAnswers[key] = val;
  p.updatedAt = Date.now();
  idbPut('policies', p);
}
async function compileDN(id){
  const p = STATE.policies.find(x=>x.id===id); if(!p) return;
  const dn = p.dnAnswers || {};
  const c = clientById(p.clientId);
  const cName = c?(c.preferredName||c.lastName||(c.firstName+' '+c.lastName)):'the client';
  const txt = `Demands & Needs Statement (IDD Article 20 / ICOBS 5.2)
Policy: ${p.ref} · ${PRODUCT_LABEL[p.productClass]} · ${p.insurer}
Customer: ${cName}
Prepared: ${new Date().toISOString().slice(0,10)}

DEMANDS
${cName} has identified the following insurance demands: ${dn.coverFor||'[not specified]'}

NEEDS — capacity to bear loss
${dn.capacity||'[not specified]'}

CLAIMS HISTORY & RISK PROFILE
${dn.claimsHistory||'[not specified]'}

PREFERENCES
${dn.preferences||'[none stated]'}

VULNERABLE CUSTOMER ASSESSMENT (FG21/1)
${dn.vulnerabilities||'No vulnerability drivers identified at point of sale.'}

BROKER STATEMENT
On the basis of the above, this policy (${PRODUCT_LABEL[p.productClass]} with ${p.insurer}, sum insured ${fmtGBP(p.sumInsured)}, indemnity limit ${fmtGBP(p.indemnityLimit)}, excess ${fmtGBP(p.excess)}) is consistent with the demands and needs of ${cName}. The customer is advised to review the cover summary, exclusions and IPID before binding, and to notify the broker of any material change in circumstance under the Insurance Act 2015 fair-presentation duty.`;
  p.demandsAndNeeds = txt;
  p.updatedAt = Date.now();
  await idbPut('policies', p);
  await appendAudit({policyId:p.id, clientId:p.clientId, action:'policy.dn.compiled', reasoning:'D&N statement generated from structured Q&A', payload:{length:txt.length}});
  meshSendDebounced('policy.updated', p);
  render();
}

// ---- IPID hash from text ----
async function hashIPIDPaste(id){
  const txt = prompt('Paste IPID text (or filename + version marker) to hash:');
  if(!txt) return;
  const h = await sha256(txt);
  const p = STATE.policies.find(x=>x.id===id);
  if(!p.ipid) p.ipid = {};
  p.ipid.sha256 = h;
  await idbPut('policies', p);
  await appendAudit({policyId:p.id, action:'policy.ipid.hashed', reasoning:'SHA-256 computed from pasted text', payload:{hash:h}});
  render();
}

async function updateClaim(id, idx, key, val){

  const comm = +(gross*pct/100).toFixed(2);

    id: newId('pol'), firmId: STATE.firm.id, clientId: $('#np-cl').value, adviserId: $('#np-ad').value,
    ts: now, updatedAt: now, lapsedAt: null,
    ref: $('#np-ref').value.trim()||('P-'+now), productClass: $('#np-pc').value,

    inceptionDate: $('#np-inc').value, renewalDate: $('#np-ren').value, expiryDate: $('#np-ren').value,
    status: $('#np-st').value,
    premium: {gross, ipt:Number($('#np-ipt').value)||0, fee:Number($('#np-fee').value)||0, commission:comm, net:+(gross-comm).toFixed(2)},
    commissionPct: pct,
    sumInsured: Number($('#np-si').value)||0, indemnityLimit: Number($('#np-il').value)||0, excess: Number($('#np-ex').value)||0,
    cover:{summary:'',exclusions:[],endorsements:[]},

async function maybePurgeDemo(){
  const demos = STATE.policies.filter(p=>p.demoFlag);
  const demoClients = STATE.clients.filter(c=>c.demoFlag);
  if(demos.length===0 && demoClients.length===0) return;
  // only purge if any non-demo exists
  if(STATE.policies.filter(p=>!p.demoFlag).length===0) return;
  for(const p of demos){ await idbDel('policies', p.id); }
  for(const c of demoClients){ await idbDel('clients', c.id); }
  STATE.policies = STATE.policies.filter(p=>!p.demoFlag);
  STATE.clients = STATE.clients.filter(c=>!c.demoFlag);

function broadcastAllRenewals(){
  const wins = [60,30,14,7];
  let n = 0;
  STATE.policies.forEach(p=>{
    const d = daysUntil(p.renewalDate);
    if(d===null || d<0) return;
    for(const w of wins){
      if(d<=w){
        meshSend('renewal.due', {policyId:p.id, ref:p.ref, days:d, window:w, productClass:p.productClass, insurer:p.insurer});
        n++;
        break;
      }
    }
  });
  appendAudit({action:'mesh.renewal.broadcast', payload:{count:n}});
  alert('Broadcast '+n+' renewal.due events');
}

// ====================================================================
function meshOnMessage(msg){
  const data = msg.data;
  if(!data || data.source===TOOLNAME) return;
  const log = $('#mesh-log');
  if(log){ const div = document.createElement('div'); div.textContent = new Date().toISOString().slice(11,19)+' · '+data.source+' · '+data.type; log.prepend(div); }
  if(data.type==='sync.request'){
    emitSnapshot();
  } else if(data.type==='sync.snapshot' && data.payload){
    mergeSnapshot(data.payload);
  } else if(data.type==='client.created' || data.type==='client.updated'){
    if(data.payload){ mergeRecord('clients', data.payload); }
  } else if(data.type==='adviser.created' || data.type==='adviser.updated'){
    if(data.payload){ mergeRecord('advisers', data.payload); }
  } else if(data.type==='firm.updated'){
    if(data.payload){ STATE.firm = data.payload; idbPut('firms', data.payload); render(); }
  }
}
async function mergeRecord(store, rec){
  const local = STATE[store].find(x=>x.id===rec.id);
  if(!local || (rec.updatedAt||0) > (local.updatedAt||0)){
    await idbPut(store, rec);
    STATE[store] = STATE[store].filter(x=>x.id!==rec.id);
    STATE[store].push(rec);
    render();
  }
}
async function mergeSnapshot(snap){
  if(snap.firm) await mergeRecord('firms', snap.firm);
  if(Array.isArray(snap.advisers)) for(const a of snap.advisers) await mergeRecord('advisers', a);
  if(Array.isArray(snap.clients)) for(const c of snap.clients) await mergeRecord('clients', c);
  if(Array.isArray(snap.policies)) for(const p of snap.policies) await mergeRecord('policies', p);
}
if(MESH_INS) MESH_INS.onmessage = meshOnMessage;

    signal('boot', {tool:TOOLNAME, prime:PRIME, version:VERSION, counts:{advisers:STATE.advisers.length, clients:STATE.clients.length, policies:STATE.policies.length}});
    await appendAudit({action:'boot', reasoning:'App opened', payload:{counts:{advisers:STATE.advisers.length, clients:STATE.clients.length, policies:STATE.policies.length}}});
    STATE.audit = await idbAll('audit');
    render();
  }catch(e){
    document.getElementById('app').innerHTML = '<div class="boot-screen"><div class="boot-card"><h1>◊ FallInsurance</h1><div class="sub">boot error</div><div style="color:var(--red);font-family:var(--mono);font-size:12px;margin-top:10px">'+esc(e.message||e)+'</div><div style="margin-top:14px;color:var(--cream-dim);font-size:12px">IndexedDB may be unavailable (private window?). Try a normal Chrome 113+ window.</div></div></div>';
  }
}
